<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <title>Halloween Dawn Anger</title>
    <style>
      body {
        margin: 0;
        background: #111;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        font-family: sans-serif;
      }
      #game {
        box-shadow: 0 0 40px rgba(255, 255, 255, 0.1);
        position: relative;
      }
      #volume-control {
        position: absolute;
        bottom: 12px;
        right: 12px;
        display: flex;
        align-items: center;
        gap: 8px;
        background: rgba(0, 0, 0, 0.5);
        padding: 6px 10px;
        border-radius: 6px;
        color: #fff;
        font-size: 12px;
        z-index: 10;
      }
      #volume-slider {
        width: 100px;
      }
      #hitbox-toggle {
        position: absolute;
        top: 12px;
        right: 12px;
        background: rgba(0, 0, 0, 0.5);
        color: #fff;
        border: 1px solid #555;
        padding: 6px 12px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
        z-index: 10;
        font-family: sans-serif;
      }
      #hitbox-toggle:hover {
        background: rgba(0, 0, 0, 0.7);
      }
      #hitbox-toggle.off {
        opacity: 0.6;
      }
      #dev-power-panel {
        position: absolute;
        top: 56px;
        right: 12px;
        display: flex;
        flex-direction: column;
        gap: 4px;
        background: rgba(0, 0, 0, 0.55);
        padding: 8px;
        border-radius: 6px;
        z-index: 10;
        font-family: sans-serif;
      }
      #dev-power-panel .dev-label {
        color: #aaa;
        font-size: 11px;
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 2px;
      }
      .dev-power-btn {
        background: rgba(30, 30, 40, 0.8);
        color: #fff;
        border: 1px solid #444;
        padding: 6px 10px;
        border-radius: 4px;
        font-size: 12px;
        cursor: pointer;
        font-family: sans-serif;
        text-align: left;
        min-width: 140px;
      }
      .dev-power-btn:hover {
        background: rgba(60, 60, 80, 0.9);
      }
      .dev-power-btn.active {
        border-color: #38bdf8;
        background: rgba(20, 60, 90, 0.9);
      }
      #lobby {
        position: fixed;
        inset: 0;
        background: rgba(10, 10, 20, 0.95);
        z-index: 2000;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: #fff;
        font-family: sans-serif;
        gap: 16px;
      }
      #lobby h1 {
        color: #ff9646;
        margin: 0 0 24px 0;
        letter-spacing: 2px;
      }
      #lobby button {
        background: rgba(40, 40, 60, 0.9);
        color: #fff;
        border: 1px solid #666;
        padding: 10px 24px;
        border-radius: 6px;
        font-size: 14px;
        cursor: pointer;
        font-family: sans-serif;
        min-width: 200px;
      }
      #lobby button:hover {
        background: rgba(80, 80, 120, 0.9);
        border-color: #aaa;
      }
      #lobby .row {
        display: flex;
        gap: 8px;
        align-items: center;
      }
      #lobby input {
        padding: 8px 12px;
        border-radius: 6px;
        border: 1px solid #666;
        background: rgba(30, 30, 40, 0.9);
        color: #fff;
        font-size: 13px;
        min-width: 240px;
      }
      #lobby .panel {
        display: none;
        flex-direction: column;
        gap: 10px;
        align-items: center;
      }
      #lobby .panel.visible {
        display: flex;
      }
      #lobby .muted {
        color: #999;
        font-size: 12px;
      }
      #lobby .id-display {
        background: rgba(30, 30, 40, 0.9);
        padding: 8px 14px;
        border-radius: 6px;
        border: 1px solid #555;
        font-family: monospace;
        font-size: 13px;
        user-select: all;
      }
      #lobby .players-list {
        display: flex;
        flex-direction: column;
        gap: 6px;
        background: rgba(30, 30, 40, 0.7);
        padding: 10px 14px;
        border-radius: 6px;
        border: 1px solid #444;
        min-width: 260px;
      }
      #lobby .player-row {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        font-size: 13px;
        color: #eee;
      }
      #lobby .player-row .tag {
        color: #999;
        font-size: 11px;
      }
      #lobby button:disabled {
        opacity: 0.4;
        cursor: not-allowed;
      }
      #lobby .picker {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      #lobby .picker-label {
        color: #bbb;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      #lobby .picker-tiles {
        display: flex;
        gap: 8px;
      }
      .char-tile {
        background: rgba(30, 30, 40, 0.9);
        border: 2px solid #555;
        border-radius: 6px;
        padding: 4px;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2px;
      }
      .char-tile:hover {
        border-color: #888;
      }
      .char-tile.selected {
        border-color: #ff9646;
        background: rgba(80, 50, 20, 0.9);
      }
      .char-preview {
        width: 192px;
        height: 128px;
        background-size: 2304px 256px;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        animation: idle-anim 0.6s steps(6) infinite;
      }
      @keyframes idle-anim {
        from { background-position: -18px -72px; }
        to { background-position: -2322px -72px; }
      }
      .char-tile .char-name {
        color: #ddd;
        font-size: 13px;
        font-weight: bold;
        margin-top: 4px;
      }
      .player-row {
        padding: 6px 0;
        border-bottom: 1px solid #333;
      }
      .player-row:last-child {
        border-bottom: none;
      }
      .player-row .char-mini {
        width: 96px;
        height: 64px;
        background-size: 1152px 128px;
        background-repeat: no-repeat;
        image-rendering: pixelated;
        animation: idle-anim-mini 0.6s steps(6) infinite;
      }
      @keyframes idle-anim-mini {
        from { background-position: -9px -36px; }
        to { background-position: -1161px -36px; }
      }
      .char-tile.selected {
        border-color: #ff9646;
        background: rgba(80, 50, 20, 0.9);
        box-shadow: 0 0 12px rgba(255, 150, 70, 0.5);
      }
    </style>
  </head>
  <body>
    <div id="lobby">
      <h1>Halloween Dawn Anger</h1>
      <div id="lobby-choice" class="panel visible">
        <button id="btn-single" type="button">Single Player</button>
        <button id="btn-host" type="button">Criar Partida (Host)</button>
        <button id="btn-join" type="button">Entrar em Partida</button>
      </div>
      <div id="lobby-host" class="panel">
        <p class="muted">Envie seu código para o seu amigo:</p>
        <div class="id-display" id="host-id">gerando...</div>
        <button id="btn-copy-id" type="button">Copiar código</button>
        <p class="muted" id="host-status">Aguardando conexão...</p>
        <div class="picker">
          <div class="picker-label">Seu nick</div>
          <input id="host-nick" type="text" maxlength="12" placeholder="Seu nick" />
        </div>
        <div class="picker">
          <div class="picker-label">Seu personagem</div>
          <div class="picker-tiles" id="host-picker"></div>
        </div>
        <div class="players-list" id="host-players"></div>
        <button id="btn-start-match" type="button" disabled>Iniciar partida (1/4)</button>
        <button id="btn-host-back" type="button">Voltar</button>
      </div>
      <div id="lobby-join" class="panel">
        <p class="muted">Digite o código do host (5 dígitos):</p>
        <input id="join-id" type="text" inputmode="numeric" maxlength="5" placeholder="12345" />
        <button id="btn-connect" type="button">Conectar</button>
        <p class="muted" id="join-status"></p>
        <button id="btn-join-back" type="button">Voltar</button>
      </div>
      <div id="lobby-waiting" class="panel">
        <p class="muted">Conectado. Aguardando o host iniciar a partida...</p>
        <div class="picker">
          <div class="picker-label">Seu nick</div>
          <input id="waiting-nick" type="text" maxlength="12" placeholder="Seu nick" />
        </div>
        <div class="picker">
          <div class="picker-label">Seu personagem</div>
          <div class="picker-tiles" id="waiting-picker"></div>
        </div>
        <div class="players-list" id="waiting-players"></div>
        <button id="btn-waiting-back" type="button">Sair</button>
      </div>
    </div>
    <div id="game">
      <button id="hitbox-toggle" type="button">Hitbox: ON</button>
      <div id="dev-power-panel">
        <div class="dev-label">DEV: escolher poder</div>
        <button class="dev-power-btn" data-power="none" type="button">Nenhum</button>
        <button class="dev-power-btn" data-power="heavens_fury" type="button">1 - Heavens Fury</button>
        <button class="dev-power-btn" data-power="shield" type="button">2 - Holy Shield</button>
        <button class="dev-power-btn" data-power="skull_curse" type="button">3 - Skull Curse</button>
        <button class="dev-power-btn" data-power="wheel" type="button">4 - Wheel</button>
        <button class="dev-power-btn" data-power="fire_storm" type="button">5 - Fire Storm</button>
        <button id="dev-eye-toggle" class="dev-power-btn" type="button">6 - Flying Eye (transform)</button>
        <button class="dev-power-btn" data-power="ice_beam" type="button">7 - Ice Beam</button>
        <button class="dev-power-btn" data-power="skeleton_attack" type="button">8 - Skeleton Attack</button>
      </div>
      <div id="volume-control">
        <span>Volume</span>
        <input id="volume-slider" type="range" min="0" max="100" value="5" />
        <span id="volume-value">5%</span>
      </div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
